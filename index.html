<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time-Over Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="dark">
  <div class="theme-toggle">
    <label class="switch">
      <input type="checkbox" id="themeSwitch" checked>
      <span class="slider"></span>
    </label>
    <span>Dark Mode</span>
  </div>

  <div class="container">
    <h1>8-Hour Time Calculator</h1>

    <div class="grid">
      <div class="field">
        <label for="effHours">Current Effective Hours</label>
        <input type="number" id="effHours" min="0" max="8" placeholder="Hours" />
      </div>

      <div class="field">
        <label for="effMinutes">Current Effective Minutes</label>
        <input type="number" id="effMinutes" min="0" max="59" placeholder="Minutes" />
      </div>

      <div class="field">
        <label for="lastHour">Last Punch-in Hour (24h)</label>
        <input type="number" id="lastHour" min="0" max="23" placeholder="Hour" />
      </div>

      <div class="field">
        <label for="lastMinute">Last Punch-in Minute</label>
        <input type="number" id="lastMinute" min="0" max="59" placeholder="Minute" />
      </div>
    </div>

    <button id="calcBtn">Calculate End Time</button>
    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
