<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark">
  <title>Time-Over Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="dark">
  <header class="topbar">
    <div class="brand">
      <svg class="clock" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2" />
        <path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="brand-text">Time Calculator</span>
    </div>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main class="container">
    <h1>8-Hour Time Calculator</h1>

    <!-- Shift Type Selector -->
    <div class="shift-selector">
      <span class="shift-label">Shift Type</span>
      <div class="shift-options" role="group" aria-label="Shift type">
        <label class="shift-option">
          <input type="radio" name="shiftType" value="full" checked />
          <span class="shift-card">
            <strong>Full Day</strong>
            <small>10 AM – 7 PM · 8 hrs</small>
          </span>
        </label>
        <label class="shift-option">
          <input type="radio" name="shiftType" value="first" />
          <span class="shift-card">
            <strong>First Half</strong>
            <small>10 AM – 2 PM · 4 hrs</small>
          </span>
        </label>
        <label class="shift-option">
          <input type="radio" name="shiftType" value="second" />
          <span class="shift-card">
            <strong>Second Half</strong>
            <small>3 PM – 7 PM · 4 hrs</small>
          </span>
        </label>
      </div>
    </div>

    <div class="grid">
      <div class="field">
        <label for="effHours">Current Effective Hours</label>
        <input type="number" id="effHours" min="0" max="12" placeholder="Hours" />
      </div>
      <div class="field">
        <label for="effMinutes">Current Effective Minutes</label>
        <input type="number" id="effMinutes" min="0" max="59" placeholder="Minutes" />
      </div>
      <div class="field">
        <label for="lastHour">Last Punch-in Hour <span class="hint">(1–12)</span></label>
        <input type="number" id="lastHour" min="1" max="12" placeholder="Hour (1–12)" />
      </div>
      <div class="field">
        <label for="lastMinute">Last Punch-in Minute</label>
        <input type="number" id="lastMinute" min="0" max="59" placeholder="Minute" />
      </div>
    </div>
    <button id="calcBtn">Calculate</button>
    <p id="result" aria-live="polite"></p>
  </main>
  <script src="script.js"></script>
</body>

</html>
