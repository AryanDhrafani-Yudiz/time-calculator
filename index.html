<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Time Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orb1: #0ea5e9;
      --orb2: #8b5cf6;
      --orb3: #06b6d4;
      --orb4: #ec4899;
      --card-bg: rgba(255,255,255,0.045);
      --card-border: rgba(255,255,255,0.10);
      --text: #f0f4ff;
      --muted: rgba(200,210,255,0.55);
      --primary: #38bdf8;
      --primary-glow: rgba(56,189,248,0.25);
      --input-bg: rgba(255,255,255,0.06);
      --input-border: rgba(255,255,255,0.12);
      --input-focus: rgba(56,189,248,0.35);
      --success: #34d399;
      --error: #f87171;
      --selected-bg: rgba(56,189,248,0.12);
      --selected-border: #38bdf8;
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: #030712;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Canvas: aurora orbs ── */
    .aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.38;
      animation: drift linear infinite;
    }

    .orb-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, var(--orb1), transparent 70%);
      top: -15%; left: -10%;
      animation-duration: 28s;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, var(--orb2), transparent 70%);
      top: 30%; right: -10%;
      animation-duration: 35s;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--orb3), transparent 70%);
      bottom: -10%; left: 25%;
      animation-duration: 40s;
      animation-delay: -14s;
    }
    .orb-4 {
      width: 340px; height: 340px;
      background: radial-gradient(circle, var(--orb4), transparent 70%);
      top: 10%; right: 20%;
      animation-duration: 22s;
      animation-delay: -4s;
      opacity: 0.20;
    }

    @keyframes drift {
      0%   { transform: translate(0px, 0px) scale(1); }
      25%  { transform: translate(60px, -40px) scale(1.07); }
      50%  { transform: translate(30px, 70px) scale(0.95); }
      75%  { transform: translate(-50px, 30px) scale(1.04); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    /* ── Particle stars ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.4); }
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ── */
    .topbar {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(3,7,18,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--orb1), var(--orb2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(14,165,233,0.4);
    }

    .brand-icon svg { width: 18px; height: 18px; stroke: #fff; }

    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
    .theme-toggle svg { width: 18px; height: 18px; stroke: currentColor; }

    /* ── Main container ── */
    .wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
    }

    .card {
      width: 100%;
      max-width: 660px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 36px 36px 32px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.08);
      animation: floatIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Heading ── */
    .card-head {
      margin-bottom: 28px;
    }

    .card-head h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
      background: linear-gradient(120deg, #e0f2fe 0%, #a5f3fc 45%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-head p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Shift selector ── */
    .shift-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .shift-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .shift-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }

    .shift-card {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 11px 16px;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
      min-width: 140px;
      background: var(--input-bg);
    }

    .shift-card strong {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .shift-card small {
      font-size: 11.5px;
      color: var(--muted);
    }

    .shift-option:hover .shift-card {
      border-color: rgba(56,189,248,0.5);
      background: rgba(56,189,248,0.06);
      transform: translateY(-1px);
    }

    .shift-option input[type="radio"]:checked + .shift-card {
      border-color: var(--selected-border);
      background: var(--selected-bg);
      box-shadow: 0 0 18px rgba(56,189,248,0.15), inset 0 0 12px rgba(56,189,248,0.05);
    }

    .shift-option input[type="radio"]:checked + .shift-card strong {
      color: var(--primary);
    }

    /* ── Input grid ── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field .hint {
      font-size: 10.5px;
      opacity: 0.65;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field input::placeholder { color: rgba(200,210,255,0.25); }

    .field input:focus {
      border-color: rgba(56,189,248,0.6);
      background: rgba(56,189,248,0.06);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    /* Remove number arrows */
    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .field input[type=number] { -moz-appearance: textfield; }

    /* ── Button ── */
    #calcBtn {
      width: 100%;
      margin-top: 18px;
      padding: 14px 20px;
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(99,102,241,0.35);
      position: relative;
      overflow: hidden;
    }

    #calcBtn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    #calcBtn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.45);
    }

    #calcBtn:active { transform: scale(0.98); }

    /* ── Result ── */
    #result {
      margin-top: 20px;
      min-height: 56px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      line-height: 1.65;
      border-radius: 14px;
      padding: 14px 18px;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
      opacity: 0;
    }

    #result.visible { opacity: 1; }

    #result.success {
      color: var(--success);
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.2);
    }

    #result.error {
      color: var(--error);
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      font-weight: 400;
    }

    #result.info {
      color: var(--text);
      background: rgba(56,189,248,0.07);
      border: 1px solid rgba(56,189,248,0.15);
    }

    #result strong {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #e0f2fe;
    }

    #result .sub {
      display: block;
      margin-top: 3px;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 26px 0 22px;
    }

    /* ── Responsive ── */
    @media (max-width: 540px) {
      .card { padding: 24px 20px 22px; border-radius: 18px; }
      .card-head h1 { font-size: 22px; }
      .grid { grid-template-columns: 1fr; }
      .shift-options { flex-direction: column; }
      .shift-card { min-width: unset; }
    }

    /* Light mode */
    body.light {
      background: #f0f4ff;
      --card-bg: rgba(255,255,255,0.75);
      --card-border: rgba(0,0,0,0.08);
      --text: #0f172a;
      --muted: rgba(71,84,103,0.75);
      --input-bg: rgba(255,255,255,0.9);
      --input-border: rgba(0,0,0,0.12);
      --input-focus: rgba(14,165,233,0.2);
      --selected-bg: rgba(14,165,233,0.08);
      --selected-border: #0ea5e9;
      --success: #059669;
      --error: #dc2626;
    }

    body.light .orb { opacity: 0.18; }
    body.light .topbar { background: rgba(240,244,255,0.75); border-bottom: 1px solid rgba(0,0,0,0.07); }
    body.light .field input { color: #0f172a; }
    body.light .card-head h1 {
      background: linear-gradient(120deg, #0369a1 0%, #0891b2 45%, #7c3aed 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }
    body.light #result.info { color: #0369a1; }
    body.light #result strong { color: #0c4a6e; }
    body.light .star { background: #7c3aed; }
  </style>
</head>
<body class="dark">

  <!-- Aurora background -->
  <div class="aurora" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Stars layer (injected by JS) -->
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="page">
    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 2"/>
          </svg>
        </div>
        Time Calculator
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Main -->
    <main class="wrap">
      <div class="card">
        <div class="card-head">
          <h1>8-Hour Time Calculator</h1>
          <p>Find out exactly when your shift wraps up</p>
        </div>

        <!-- Shift selector -->
        <span class="shift-label">Shift Type</span>
        <div class="shift-options" role="group" aria-label="Shift type">
          <label class="shift-option">
            <input type="radio" name="shiftType" value="full" checked />
            <span class="shift-card">
              <strong>Full Day</strong>
              <small>10 AM – 7 PM · 8 hrs</small>
            </span>
          </label>
          <label class="shift-option">
            <input type="radio" name="shiftType" value="first" />
            <span class="shift-card">
              <strong>First Half</strong>
              <small>10 AM – 2 PM · 4 hrs</small>
            </span>
          </label>
          <label class="shift-option">
            <input type="radio" name="shiftType" value="second" />
            <span class="shift-card">
              <strong>Second Half</strong>
              <small>3 PM – 7 PM · 4 hrs</small>
            </span>
          </label>
        </div>

        <div class="divider"></div>

        <!-- Inputs -->
        <div class="grid">
          <div class="field">
            <label for="effHours">Effective Hours</label>
            <input type="number" id="effHours" min="0" max="12" placeholder="0" />
          </div>
          <div class="field">
            <label for="effMinutes">Effective Minutes</label>
            <input type="number" id="effMinutes" min="0" max="59" placeholder="0" />
          </div>
          <div class="field">
            <label for="lastHour">Last Punch-in Hour <span class="hint">(1–12)</span></label>
            <input type="number" id="lastHour" min="1" max="12" placeholder="10" />
          </div>
          <div class="field">
            <label for="lastMinute">Last Punch-in Minute</label>
            <input type="number" id="lastMinute" min="0" max="59" placeholder="0" />
          </div>
        </div>

        <button id="calcBtn">Calculate Shift End</button>

        <p id="result" aria-live="polite"></p>
      </div>
    </main>
  </div>

  <script>
  (function () {
    /* ── Stars ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2 + 0.8;
      s.style.cssText = `
        width:${sz}px; height:${sz}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        animation-duration:${2.5+Math.random()*4}s;
        animation-delay:${Math.random()*6}s;
      `;
      starsEl.appendChild(s);
    }

    /* ── DOM refs ── */
    const $ = id => document.getElementById(id);
    const effH  = $('effHours');
    const effM  = $('effMinutes');
    const lastH = $('lastHour');
    const lastM = $('lastMinute');
    const result = $('result');
    const btn    = $('calcBtn');
    const themeToggle = $('themeToggle');
    const themeIcon   = $('themeIcon');

    /* ── Theme ── */
    const moonPath = 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z';
    const sunPath  = 'M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41';

    function setTheme(isDark) {
      document.body.classList.toggle('dark', isDark);
      document.body.classList.toggle('light', !isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      const p = themeIcon.querySelector('path');
      if (p) p.setAttribute('d', isDark ? sunPath : moonPath);
    }

    const saved = localStorage.getItem('theme');
    setTheme(saved !== 'light');

    themeToggle.addEventListener('click', () => setTheme(!document.body.classList.contains('dark')));

    /* ── Helpers ── */
    const clamp  = (v, mn, mx) => Math.min(Math.max(Number(v || 0), mn), mx);
    const pad2   = n => String(n).padStart(2, '0');
    const isBlank = v => v === '' || v === null || v === undefined;

    const getAutoPeriod = h => (h >= 8 && h <= 11) ? 'AM' : 'PM';

    const to24h = (h, p) => {
      h = Number(h);
      if (p === 'AM') return h === 12 ? 0  : h;
      else            return h === 12 ? 12 : h + 12;
    };

    const to12h = (h, m) => {
      const s = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${pad2(h)}:${pad2(m)} ${s}`;
    };

    const getShiftConfig = () => {
      const type = document.querySelector('input[name="shiftType"]:checked').value;
      switch (type) {
        case 'first':  return { target: 240, label: 'First Half · 4 hrs' };
        case 'second': return { target: 240, label: 'Second Half · 4 hrs' };
        default:       return { target: 480, label: 'Full Day · 8 hrs' };
      }
    };

    /* ── Calculate ── */
    function calculate() {
      const eH   = clamp(effH.value, 0, 12);
      const eM   = clamp(effM.value, 0, 59);
      const lH12 = clamp(lastH.value, 1, 12);
      const lM   = clamp(lastM.value, 0, 59);

      const show = (cls, html) => {
        result.className = cls + ' visible';
        result.innerHTML = html;
      };

      if (isBlank(effH.value) || isBlank(lastH.value)) {
        show('error', '⚠️  Please fill in at least the hours fields.');
        return;
      }

      const { target, label } = getShiftConfig();
      const worked = eH * 60 + eM;

      if (worked >= target) {
        show('success', `🎉  Shift complete! You've hit ${target === 480 ? '8 hrs' : '4 hrs'}.`);
        return;
      }

      const rem = target - worked;
      const lPeriod = getAutoPeriod(lH12);
      const lH24    = to24h(lH12, lPeriod);

      let fm = lM + rem;
      let fh = lH24 + Math.floor(fm / 60);
      fm %= 60;
      fh %= 24;

      const remStr = `${Math.floor(rem / 60)}h ${rem % 60}m remaining`;
      show('info',
        `Shift ends at: <strong>${to12h(fh, fm)}</strong>` +
        `<span class="sub">${remStr} · ${label}</span>`
      );
    }

    /* ── Events ── */
    btn.addEventListener('click', calculate);
    [effH, effM, lastH, lastM].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    });
    document.querySelectorAll('input[name="shiftType"]').forEach(r => {
      r.addEventListener('change', () => { if (effH.value && lastH.value) calculate(); });
    });
  })();
  </script>
</body>
</html>
